<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{ /*box-level*/
            background-color: lightblue;
            height: 300px;
            width: 300px;
            border: 10px solid darkblue;
            padding: 10px;
            margin: 20;
        }
        a{/*inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color: black;
            padding-top: 15px;
            padding-right: 15px;
            padding-bottom: 15px;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também sao exemplos de box-level, mas os <a href="#">links</a> sao exemplos dde caixas inline-level </p>
</body>
</html>
